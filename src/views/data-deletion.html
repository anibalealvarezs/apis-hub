<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Deletion Instructions | APIs Hub</title>
    <link rel="icon" type="image/png" href="/assets/images/apishub-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --bg-card: rgba(22, 27, 34, 0.7);
            --bg-accent: #21262d;
            --primary: #58a6ff;
            --primary-glow: rgba(88, 166, 255, 0.3);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border: rgba(48, 54, 61, 0.8);
            --header-h: 70px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(35, 134, 54, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-h);
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; text-decoration: none; }
        .nav-link { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; transition: var(--transition); display: flex; align-items: center; gap: 8px; }
        .nav-link:hover { color: var(--primary); }

        main {
            padding: calc(var(--header-h) + 40px) 20px 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 50px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2.5rem; color: #fff; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h2 { font-size: 1.6rem; color: var(--primary); margin-top: 40px; margin-bottom: 20px; font-weight: 600; }
        h3 { font-size: 1.2rem; color: #fff; margin-top: 30px; margin-bottom: 15px; }
        p { margin-bottom: 1.5rem; color: var(--text-main); font-size: 1.05rem; }
        
        a { color: var(--primary); text-decoration: none; transition: var(--transition); }
        a:hover { text-decoration: underline; opacity: 0.8; }
        a:visited { color: var(--primary); }

        ul, ol { margin-left: 20px; margin-bottom: 20px; }
        li { margin-bottom: 10px; color: var(--text-main); }
        strong { color: #fff; }

        footer { padding: 40px; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); font-size: 0.85rem; }
        .subtle-link { color: inherit; text-decoration: none; transition: color 0.3s; opacity: 0.5; }
        .subtle-link:hover { opacity: 1; color: var(--primary); }

        /* Responsive */
        @media (max-width: 768px) {
            .content-card { padding: 30px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="/assets/images/apishub-trans-light-600.png" alt="APIs Hub Logo" style="height: 28px; width: auto;">
        </a>
        <nav style="display: flex; gap: 20px;">
            <a href="/" class="nav-link"><i data-lucide="home"></i> Home</a>
            <a href="/fb-reports" class="nav-link"><i data-lucide="bar-chart-3"></i> FB Reports</a>
        </nav>
    </header>

    <main>
        <div class="content-card">
            <h1>Data Deletion Instructions</h1>
            
            <div id="deletion-content">
                {{CONTENT}}
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 APIs Hub Central. Developed by <a href="https://anibalalvarez.com" target="_blank" class="subtle-link">Aníbal Álvarez</a>. | <a href="/privacy" class="subtle-link"><i data-lucide="shield" style="width: 12px; height: 12px; vertical-align: middle;"></i> Privacy Policy</a> | <a href="/data-deletion" class="subtle-link"><i data-lucide="trash-2" style="width: 12px; height: 12px; vertical-align: middle;"></i> Data Deletion</a></p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
