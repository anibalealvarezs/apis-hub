<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APIs Hub | API Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" >
    <link rel="icon" type="image/png" href="/driver-assets/core/images/apishub-favicon.png" />
    <link rel="stylesheet" href="/assets/css/api-docs.css">
    <script src="/driver-assets/core/navbar.js"></script>
    <script src="/driver-assets/core/footer.js"></script>
</head>
<body>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" charset="UTF-8"></script>
<script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
<script>
    function getAdminHeaders() {
        const EXPIRATION_TIME = 24 * 60 * 60 * 1000; // 24 hours
        const now = Date.now();
        let auth = JSON.parse(localStorage.getItem('apis_hub_admin_auth') || '{}');
        
        if (!auth.token || (now - auth.timestamp > EXPIRATION_TIME)) {
            const token = prompt('ADMIN ACCESS REQUIRED: Please enter your administrative API key to continue.');
            if (token) {
                auth = { token, timestamp: now };
                localStorage.setItem('apis_hub_admin_auth', JSON.stringify(auth));
            } else {
                return {};
            }
        }
        
        return {
            'Authorization': 'Bearer ' + auth.token,
            'Content-Type': 'application/json'
        };
    }

    window.onload = function() {
        const ui = SwaggerUIBundle({
            url: "/api/spec",
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "BaseLayout",
            requestInterceptor: (req) => {
                const headers = getAdminHeaders();
                req.headers['Authorization'] = headers['Authorization'];
                return req;
            }
        });
        window.ui = ui;
        
        // Init Lucide
        lucide.createIcons();
    };
</script>
</body>
</html>
