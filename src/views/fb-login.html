<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Meta Ads | APIs Hub</title>
    <meta name="app-env" content="demo">
    <link rel="icon" type="image/png" href="/assets/images/apishub-favicon.png">
    
    <!-- Design System & Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/assets/navbar.js"></script>
    <script src="/assets/footer.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 10%, #1c2128 0%, #0d1117 80%);
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 60px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-section {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-section img {
            height: 48px;
            filter: drop-shadow(0 0 15px rgba(88, 166, 255, 0.4));
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 34px;
            margin: 0 0 12px 0;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
        }

        .description {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 40px 0;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .fb-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #1877f2 0%, #0a4da2 100%);
            color: #fff;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(24, 119, 242, 0.2);
        }

        .fb-action-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(24, 119, 242, 0.4);
            filter: brightness(1.1);
        }

        .fb-action-btn:active { transform: scale(0.98); }

        .legal-notice {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .legal-notice a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .legal-notice a:hover { text-decoration: underline; }

        .secure-tag {
            background: rgba(63, 185, 80, 0.1);
            color: #3fb950;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(63, 185, 80, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .partnership {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="auth-card">
            <div class="logo-section">
                <img src="/assets/images/apishub-trans-light-600.png" alt="APIs Hub">
                <div class="secure-tag">
                    <i data-lucide="shield-check" style="width: 14px;"></i> Verified Provider
                </div>
            </div>

            <h2>Connect Meta Ads</h2>
            <p class="description">
                Grant APIs Hub <strong>secure access</strong> to your campaign data. 
                We request read-only permissions for performance reporting.
            </p>

            <a href="/fb-auth-start" class="fb-action-btn">
                <i data-lucide="facebook" style="fill: #fff; width: 22px; height: 22px;"></i>
                Continue with Facebook
            </a>

            <div class="legal-notice">
                By connecting, you agree to our 
                <br>
                <a href="/privacy">Privacy Policy</a> & 
                <a href="/tos">Terms of Service</a>
                
                <div class="partnership">
                    <i data-lucide="award" style="width: 12px;"></i> Official Marketing API Integration
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
