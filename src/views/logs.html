<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIs Hub | Log Explorer</title>
    <meta name="app-env" content="demo">
    <link rel="icon" type="image/png" href="/driver-assets/core/images/apishub-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="/driver-assets/core/navbar.js"></script>
    <script src="/driver-assets/core/footer.js"></script>
    <link rel="stylesheet" href="/driver-assets/core/css/main.css">
    <link rel="stylesheet" href="/assets/css/logs.css">
</head>
<body class="full-screen">

    <main>
        <div class="log-explorer-header">
            <div class="log-controls">
                <select id="log-file-selector" class="log-select" onchange="changeLogFile()">
                    <option value="">-- Loading log files --</option>
                </select>
                <div class="btn" onclick="fetchLogs()">
                    <i data-lucide="refresh-cw"></i> Refresh
                </div>
            </div>
            <div class="log-controls">
                <label class="refresh-toggle">
                    <input type="checkbox" id="auto-refresh-check" checked onchange="toggleAutoRefresh()">
                    Auto-refresh (10s)
                </label>
                <label class="refresh-toggle">
                    <input type="checkbox" id="auto-scroll-check" checked>
                    Auto-scroll
                </label>
                <div class="btn btn-clear" onclick="clearConsole()">
                    <i data-lucide="trash-2"></i> Clear View
                </div>
            </div>
        </div>

        <div class="console-wrapper">
            <div class="console-toolbar">
                <div id="log-info-label">Select a log file to begin</div>
                <div id="last-updated-label">Last check: Never</div>
            </div>
            <div id="log-console">
                <div class="empty-state">
                    <i data-lucide="scroll" style="width: 48px; height: 48px; opacity: 0.2;"></i>
                    <p>Select a log file from the dropdown to start exploring real-time activity.</p>
                </div>
            </div>
        </div>
    </main>


    <script>
        function getAdminHeaders() {
            const EXPIRATION_TIME = 24 * 60 * 60 * 1000; // 24 hours
            const now = Date.now();
            let auth = JSON.parse(localStorage.getItem('apis_hub_admin_auth') || '{}');
            
            if (!auth.token || (now - auth.timestamp > EXPIRATION_TIME)) {
                const token = prompt('ADMIN ACCESS REQUIRED: Please enter your administrative API key to continue.');
                if (token) {
                    auth = { token, timestamp: now };
                    localStorage.setItem('apis_hub_admin_auth', JSON.stringify(auth));
                } else {
                    return {};
                }
            }
            
            return {
                'Authorization': 'Bearer ' + auth.token,
                'Content-Type': 'application/json'
            };
        }

        async function fetchLogList() {
            try {
                const headers = getAdminHeaders();
                if (!headers.Authorization) return;

                const response = await fetch('/api/monitoring/logs/list', {
                    headers: headers
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('apis_hub_admin_auth');
                    alert('Session Expired or Invalid Key. Please reload and provide your key again.');
                    return;
                }

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                const selector = document.getElementById('log-file-selector');
                const currentVal = selector.value;
                
                selector.innerHTML = '<option value="">-- Choose log file --</option>';
                data.logs.forEach(log => {
                    const opt = document.createElement('option');
                    opt.value = log.name;
                    opt.textContent = `${log.name} (${log.size})`;
                    selector.appendChild(opt);
                });

                if (currentVal && Array.from(selector.options).some(o => o.value === currentVal)) {
                    selector.value = currentVal;
                } else if (!currentVal && data.logs.find(l => l.name === 'jobs.log')) {
                    selector.value = 'jobs.log';
                    changeLogFile();
                }
            } catch (error) {
                console.error('Error fetching log list:', error);
            }
        }

        function changeLogFile() {
            const selector = document.getElementById('log-file-selector');
            const file = selector.value;
            if (!file) return;

            document.getElementById('log-info-label').textContent = `Reading ${file}...`;
            fetchLogs(true);
        }

        async function fetchLogs(isInitial = false) {
            const selector = document.getElementById('log-file-selector');
            const consoleBox = document.getElementById('log-console');
            const file = selector.value;
            if (!file) return;

            try {
                const headers = getAdminHeaders();
                if (!headers.Authorization) return;

                const response = await fetch(`/api/monitoring/logs?file=${file}&lines=1000`, {
                    headers: headers
                });

                if (response.status === 401) {
                    localStorage.removeItem('apis_hub_admin_auth');
                    alert('Session Expired or Invalid Key. Please reload and provide your key again.');
                    return;
                }

                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                const content = data.content || 'No content found.';
                const formattedContent = colorizeLogs(content);

                if (isInitial) {
                    consoleBox.innerHTML = formattedContent;
                } else {
                    if (consoleBox.innerHTML !== formattedContent) {
                        consoleBox.innerHTML = formattedContent;
                    }
                }

                if (document.getElementById('auto-scroll-check').checked) {
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }

                document.getElementById('last-updated-label').textContent = `Last check: ${new Date().toLocaleTimeString()}`;
                document.getElementById('log-info-label').textContent = `File: ${file}`;

            } catch (error) {
                console.error('Error fetching logs:', error);
            }
        }

        function colorizeLogs(text) {
            // Very basic highlighter for Monolog standard format
            return text.split('\n').map(line => {
                let cssClass = '';
                if (line.includes('.INFO:')) cssClass = 'log-line-info';
                if (line.includes('.WARNING:')) cssClass = 'log-line-warning';
                if (line.includes('.ERROR:')) cssClass = 'log-line-error';
                
                // Try to highlight timestamp
                line = line.replace(/^\[(.*?)\]/, '<span class="log-timestamp">[$1]</span>');
                
                return `<div class="${cssClass}">${line}</div>`;
            }).join('');
        }

        function toggleAutoRefresh() {
            const isEnabled = document.getElementById('auto-refresh-check').checked;
            if (isEnabled) {
                autoRefreshInterval = setInterval(() => fetchLogs(), 10000);
            } else {
                clearInterval(autoRefreshInterval);
            }
        }

        function clearConsole() {
            document.getElementById('log-console').innerHTML = '<div class="empty-state">Console cleared.</div>';
        }

        // Initialize
        fetchLogList();
        toggleAutoRefresh();
        setInterval(fetchLogList, 60000); // Refresh file list every minute
    </script>
</body>
</html>
