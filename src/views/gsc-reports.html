<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIs Hub | Google Search Console Insights</title>
    <link rel="icon" type="image/png" href="/assets/images/apishub-favicon.png">
    
    <!-- Design System & Dependencies -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/assets/navbar.js"></script>
    <script src="/assets/footer.js"></script>

    <style>
        :root {
            --gsc-clicks: #4285f4;
            --gsc-impressions: #7e57c2;
            --gsc-ctr: #0097a7;
            --gsc-pos: #f4511e;
        }

        .metrics-grid-gsc {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card-stat-gsc {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: 4px solid var(--color, transparent);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.5;
            animation: slideIn 0.3s ease-out;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-stat-gsc:hover { transform: translateY(-3px); background: rgba(255,255,255,0.02); }
        .card-stat-gsc.active { opacity: 1; border-bottom-color: var(--color); background: rgba(255,255,255,0.03); }

        .gsc-label { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.05em; }
        .card-metric-value { font-size: 2.2rem; font-weight: 800; color: #fff; line-height: 1.2; }
        
        /* Flatpickr Range Styling Fix */
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange,
        .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange,
        .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus,
        .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover,
        .flatpickr-day.selected.prevMonthDay, .flatpickr-day.startRange.prevMonthDay, .flatpickr-day.endRange.prevMonthDay,
        .flatpickr-day.selected.nextMonthDay, .flatpickr-day.startRange.nextMonthDay, .flatpickr-day.endRange.nextMonthDay {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
        }
        .flatpickr-day.inRange {
            background: rgba(var(--primary-rgb, 66, 133, 244), 0.2) !important;
            border-color: transparent !important;
            box-shadow: -5px 0 0 rgba(var(--primary-rgb, 66, 133, 244), 0.2), 5px 0 0 rgba(var(--primary-rgb, 66, 133, 244), 0.2) !important;
        }
        
        .chart-container-gsc { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 30px; 
            height: 450px; 
            position: relative;
        }

        .tab-section { margin-top: 40px; }
        
        .gsc-table-container { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            overflow: hidden;
        }

        .table-controls { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .tab-nav-gsc { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .tab-gsc { padding: 15px 25px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-dim); border-right: 1px solid var(--border); transition: all 0.2s; }
        .tab-gsc:hover { background: rgba(255,255,255,0.03); }
        .tab-gsc.active { background: var(--bg-card); color: var(--primary); border-bottom: 2px solid var(--primary); }

        .metric-cell { text-align: right; width: 120px; }
        .progress-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; transition: width 0.6s ease; }

        .gsc-header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .gsc-header-title { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; }
        .gsc-header-subtitle { color: var(--text-dim); font-size: 0.9rem; }
        .gsc-header-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 0; }
        .btn-flush-cache { border-color: rgba(255,255,255,0.1); color: var(--text-dim); display: flex; align-items: center; gap: 8px; font-weight: 500; }
        
        .property-selector { min-width: 250px; }
        
        .metric-cell { text-align: right; min-width: 130px; vertical-align: middle; }
        .metric-val-main { color: #fff; font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
        
        .gsc-url-container { display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; }
        .gsc-url-text { font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
        .gsc-external-link { color: var(--primary); display: flex; align-items: center; opacity: 0.7; transition: all 0.2s; flex-shrink: 0; }
        .gsc-external-link:hover { opacity: 1; transform: scale(1.1); }

        .flatpickr-monthDropdown-month { background: #1f2937; color: #fff; }
        .flatpickr-monthDropdown-months { background: transparent; color: #fff; border: none; }
        .flatpickr-calendar select { background: #1f2937 !important; color: #fff !important; }
        
        .loader-overlay-gsc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.9); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="full-screen">

    <div id="loader" class="loader-overlay-gsc">
        <div class="spinner"></div>
        <p class="loader-text">SYNCING PERFORMANCE DATA...</p>
    </div>

    <main>
        <div class="gsc-header-row">
            <div class="gsc-header-info">
                <h1 class="gsc-header-title">
                    <i data-lucide="search" style="color: #4285f4;"></i> Google Search Console
                </h1>
                <p class="gsc-header-subtitle">Performance on Google Search results</p>
            </div>
            <div class="controls-card gsc-header-controls">
                <div class="control-group">
                    <i data-lucide="globe" class="control-icon"></i>
                    <select id="propertySelector" class="date-input property-selector" onchange="loadReport()"></select>
                </div>
                <div class="date-container">
                    <i data-lucide="calendar"></i>
                    <input type="text" id="reportRange" placeholder="Select Range" class="date-input">
                </div>
                <button class="btn btn-primary" onclick="loadReport()">
                    <i data-lucide="refresh-cw"></i> Update
                </button>
                <button class="btn btn-outline btn-flush-cache" onclick="flushCache()" title="Clear Dashboard Cache">
                    <i data-lucide="zap" style="width: 16px; height: 16px;"></i> FLUSH CACHE
                </button>
            </div>
        </div>

        <div class="metrics-grid-gsc">
            <div class="card-stat-gsc active" data-metric="clicks" onclick="toggleMetric('clicks')" style="--color: #4285f4; border-bottom-color: #4285f4; opacity: 1;">
                <div class="gsc-label">Total Clicks</div>
                <div class="card-metric-value" id="val-clicks">0</div>
                <div class="card-metric-trend" id="trend-clicks">--</div>
            </div>
            <div class="card-stat-gsc active" data-metric="impressions" onclick="toggleMetric('impressions')" style="--color: #7e57c2; border-bottom-color: #7e57c2; opacity: 1;">
                <div class="gsc-label">Total Impressions</div>
                <div class="card-metric-value" id="val-impressions">0</div>
                <div class="card-metric-trend" id="trend-impressions">--</div>
            </div>
            <div class="card-stat-gsc" data-metric="ctr" onclick="toggleMetric('ctr')" style="--color: #0097a7; border-bottom-color: transparent; opacity: 0.5;">
                <div class="gsc-label">Average CTR</div>
                <div class="card-metric-value" id="val-ctr">0.00%</div>
                <div class="card-metric-trend" id="trend-ctr">--</div>
            </div>
            <div class="card-stat-gsc" data-metric="position" onclick="toggleMetric('position')" style="--color: #f4511e; border-bottom-color: transparent; opacity: 0.5;">
                <div class="gsc-label">Average Position</div>
                <div class="card-metric-value" id="val-position">0.0</div>
                <div class="card-metric-trend" id="trend-position">--</div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-container-gsc">
            <canvas id="mainChart"></canvas>
        </div>

        <!-- Breakdown Section -->
        <div class="tab-section">
            <div class="gsc-table-container">
                <div class="tab-nav-gsc">
                    <div class="tab-gsc active" data-tab="queries" onclick="switchTab(this, 'queries')">QUERIES</div>
                    <div class="tab-gsc" data-tab="pages" onclick="switchTab(this, 'pages')">PAGES</div>
                    <div class="tab-gsc" data-tab="countries" onclick="switchTab(this, 'countries')">COUNTRIES</div>
                    <div class="tab-gsc" data-tab="devices" onclick="switchTab(this, 'devices')">DEVICES</div>
                    <div class="tab-gsc" data-tab="appearances" onclick="switchTab(this, 'appearances')">SEARCH APPEARANCE</div>
                </div>
                
                <div class="table-scroll-area">
                    <table id="gsc-breakdown-table">
                            <thead>
                                <tr>
                                    <th id="dim-header-label">Search Query</th>
                                    <th onclick="sortTable('clicks')" style="cursor:pointer;">
                                        <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px;">
                                            CLICKS <span class="sort-icon-wrapper"><i data-lucide="chevrons-up-down" class="sort-icon" style="width:14px; height:14px;"></i></span>
                                        </div>
                                    </th>
                                    <th onclick="sortTable('impressions')" style="cursor:pointer;">
                                        <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px;">
                                            IMPRESSIONS <span class="sort-icon-wrapper"><i data-lucide="chevrons-up-down" class="sort-icon" style="width:14px; height:14px;"></i></span>
                                        </div>
                                    </th>
                                    <th onclick="sortTable('ctr')" style="cursor:pointer;">
                                        <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px;">
                                            CTR <span class="sort-icon-wrapper"><i data-lucide="chevrons-up-down" class="sort-icon" style="width:14px; height:14px;"></i></span>
                                        </div>
                                    </th>
                                    <th onclick="sortTable('position')" style="cursor:pointer;">
                                        <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px;">
                                            POSITION <span class="sort-icon-wrapper"><i data-lucide="chevrons-up-down" class="sort-icon" style="width:14px; height:14px;"></i></span>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                        <tbody id="breakdown-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- GSC_CONFIG_PLACEHOLDER -->
    <script src="/assets/views/gsc-reports.js"></script>
</body>
</html>
