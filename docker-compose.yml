version: '3.8'

services:
  gsc-jan:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - API_SOURCE=gsc
      - API_ENTITY=query
      - START_DATE=2026-01-01
      - END_DATE=2026-01-31
      - DB_DRIVER=pdo_mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=NoEntiendo2321
      - DB_NAME=apis-hub-3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - /app/vendor
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gsc-feb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - API_SOURCE=gsc
      - API_ENTITY=query
      - START_DATE=2026-02-01
      - END_DATE=2026-02-28
      - DB_DRIVER=pdo_mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=NoEntiendo2321
      - DB_NAME=apis-hub-3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - /app/vendor
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fb-ads:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - API_SOURCE=fb-ads
      - API_ENTITY=channeled_campaign
      - DB_DRIVER=pdo_mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=NoEntiendo2321
      - DB_NAME=apis-hub-3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - /app/vendor
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
